<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {tertiary: "#006e2e", "on-tertiary-fixed": "#004c1d", "on-surface": "#24334a", "on-error-container": "#6e0523", "on-secondary-container": "#7e4200", background: "#f9f9ff", "error-container": "#f97386", "on-primary-container": "#000000", "on-secondary": "#fff7f4", "on-primary": "#faf8ff", "secondary-fixed-dim": "#ffcaa1", outline: "#6c7b96", "on-tertiary-fixed-variant": "#006c2d", "primary-fixed-dim": "#386bef", "secondary-container": "#ffdcc3", "outline-variant": "#a3b3cf", "on-secondary-fixed-variant": "#8c4a00", surface: "#f9f9ff", error: "#a8364b", "surface-dim": "#cbdbf9", "inverse-primary": "#638aff", "on-primary-fixed": "#ffffff", "on-secondary-fixed": "#633300", "on-tertiary": "#e9ffe6", "on-background": "#24334a", "surface-bright": "#f9f9ff", "surface-container-highest": "#d5e3ff", "secondary-fixed": "#ffdcc3", "on-tertiary-container": "#006127", "on-error": "#fff7f7", "tertiary-fixed": "#82ff99", "surface-tint": "#1554d9", "inverse-surface": "#070e19", primary: "#1554d9", "surface-container": "#e7eeff", secondary: "#914d00", "primary-fixed": "#4878fd", "inverse-on-surface": "#969dac", "tertiary-container": "#82ff99", "surface-variant": "#d5e3ff", "on-surface-variant": "#506079", "on-primary-fixed-variant": "#fefcff", "primary-container": "#4878fd", "tertiary-fixed-dim": "#73f08c", "surface-container-high": "#dee8ff", "surface-container-low": "#f0f3ff", "surface-container-lowest": "#ffffff", "tertiary-dim": "#006127", "error-dim": "#6b0221", "primary-dim": "#0047c6", "secondary-dim": "#804300"}, fontFamily: {headline: ["Inter"], body: ["Inter"], label: ["Inter"], display: "Inter"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface-dim min-h-screen font-body text-on-surface antialiased">
<!-- Background UI Mockup (The "Underlying" Ledger Page) -->
<div class="fixed inset-0 overflow-hidden flex pointer-events-none opacity-40 blur-[2px]">
<!-- Side Nav Anchor -->
<aside class="w-64 bg-slate-50 border-r border-slate-200 p-4 flex flex-col gap-4">
<div class="h-8 w-32 bg-slate-200 rounded"></div>
<div class="space-y-2 mt-8">
<div class="h-10 bg-white shadow-sm border-l-4 border-primary rounded w-full"></div>
<div class="h-10 bg-slate-100 rounded w-full"></div>
<div class="h-10 bg-slate-100 rounded w-full"></div>
</div>
</aside>
<!-- Main Content Anchor -->
<main class="flex-1 p-12 space-y-8">
<div class="flex justify-between items-end">
<div class="space-y-2">
<div class="h-12 w-64 bg-slate-300 rounded"></div>
<div class="h-4 w-48 bg-slate-200 rounded"></div>
</div>
<div class="h-10 w-32 bg-primary rounded"></div>
</div>
<div class="grid grid-cols-3 gap-6">
<div class="h-48 bg-white rounded-xl shadow-sm"></div>
<div class="h-48 bg-white rounded-xl shadow-sm"></div>
<div class="h-48 bg-white rounded-xl shadow-sm"></div>
</div>
<div class="h-96 bg-white rounded-xl shadow-sm"></div>
</main>
</div>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-on-surface/40 backdrop-blur-sm p-4">
<!-- Modal Card: The Sovereign Ledger Aesthetic -->
<div class="bg-surface-container-lowest w-full max-w-[480px] rounded-xl p-8 shadow-[0px_20px_50px_rgba(18,28,42,0.15)] ring-1 ring-on-surface/[0.05] flex flex-col items-center text-center">
<!-- Warning Icon -->
<div class="mb-6 flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-[#D97706]" data-icon="warning" style="font-variation-settings: 'FILL' 1;">
                    warning
                </span>
</div>
<!-- Title -->
<h2 class="text-[24px] font-extrabold tracking-tight text-on-surface mb-4 font-headline">
                Folio modificado
            </h2>
<!-- Main Text -->
<p class="text-[16px] leading-relaxed text-on-surface-variant mb-4 font-body">
                El folio fue modificado por otro proceso mientras trabajabas. ¿Deseas recargar el folio con los datos más recientes?
            </p>
<!-- Note (Italic) -->
<p class="text-[14px] italic text-on-surface-variant opacity-80 mb-8 font-body">
                No perderás tu trabajo — podrás revisar los datos actualizados y volver a guardar.
            </p>
<!-- Separator: Subtle Tonal Shift instead of line -->
<div class="w-full h-px bg-surface-container-highest mb-8"></div>
<!-- Actions Row -->
<div class="w-full flex justify-end items-center gap-3">
<!-- Cancelar (Ghost/Tertiary) -->
<button class="px-6 py-2.5 text-sm font-semibold text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-lg">
                    Cancelar
                </button>
<!-- Recargar (Primary Blue Gradient) -->
<button class="px-6 py-2.5 text-sm font-bold text-white bg-gradient-to-r from-primary to-primary-container rounded-lg shadow-lg shadow-primary/20 hover:opacity-90 transition-all flex items-center gap-2">
                    Recargar folio
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-tertiary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
