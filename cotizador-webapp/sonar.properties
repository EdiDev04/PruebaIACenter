# ============================================================
# SonarQube – cotizador-webapp (React 18 + TypeScript, Vite)
# ============================================================

sonar.projectKey=cotizador-webapp
sonar.projectName=Cotizador WebApp
sonar.projectVersion=0.1.0

# --- Fuentes y encoding ---
sonar.sources=src
sonar.sourceEncoding=UTF-8

# --- Tests ---
sonar.tests=src
sonar.test.inclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# --- Cobertura (lcov – generado por Vitest con coverage) ---
# Genera con: vitest run --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Exclusiones ---
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.js,\
  **/vite-env.d.ts,\
  vite.config.ts,\
  tsconfig*.json

sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.js,\
  vite.config.ts,\
  src/app/main.tsx,\
  src/vite-env.d.ts

sonar.cpd.exclusions=\
  **/DTOs/**,\
  **/*.module.css
