# ============================================================
# SonarQube – cotizador-backend (C# .NET 8, Clean Architecture)
# ============================================================

sonar.projectKey=cotizador-backend
sonar.projectName=Cotizador Backend
sonar.projectVersion=1.0.0

# --- Fuentes y encoding ---
sonar.sources=src
sonar.sourceEncoding=UTF-8

# --- Tests ---
sonar.tests=src/Cotizador.Tests
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs

# --- Cobertura (OpenCover / Coverlet) ---
# Genera con: dotnet test --collect:"XPlat Code Coverage" /p:CoverletOutputFormat=opencover
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

# --- Exclusiones ---
sonar.exclusions=\
  **/obj/**,\
  **/bin/**,\
  **/*.Designer.cs,\
  **/Migrations/**

sonar.coverage.exclusions=\
  **/Program.cs,\
  **/Migrations/**,\
  **/*Extensions.cs,\
  **/*Settings.cs

sonar.cpd.exclusions=\
  **/DTOs/**,\
  **/ValueObjects/**
