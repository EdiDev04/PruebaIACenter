# ============================================================
# SonarQube – cotizador-core-mock (Node.js + TypeScript, Express)
# ============================================================

sonar.projectKey=cotizador-core-mock
sonar.projectName=Cotizador Core Mock
sonar.projectVersion=1.0.0

# --- Fuentes y encoding ---
sonar.sources=src
sonar.sourceEncoding=UTF-8

# --- Tests ---
sonar.tests=src
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.spec.ts

# --- Cobertura (lcov) ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Exclusiones ---
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.js

sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  src/index.ts

sonar.cpd.exclusions=\
  **/fixtures/**
